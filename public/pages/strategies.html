<!DOCTYPE html>
<html lang="bn"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Signal Pro v5 — Strategies</title>
<link rel="stylesheet" href="/css/shared.css">
<style>
.page-inner{max-width:820px;margin:0 auto}
.strat-list{display:flex;flex-direction:column;gap:8px}
.scard{background:var(--bg2);border:1px solid var(--b2);border-radius:9px;overflow:hidden;cursor:grab;user-select:none;transition:box-shadow .2s}
.scard:active{cursor:grabbing}.scard.dragging{opacity:.5;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.scard.drag-over{border-color:var(--acc)}
.scard-top{display:flex;align-items:center;gap:10px;padding:11px 14px}
.drag-handle{color:var(--mu);font-size:16px;flex-shrink:0;cursor:grab}
.scard-name{flex:1}
.sname{font-size:13px;font-weight:600;color:#fff}
.sdesc{font-size:10px;color:var(--mu2);margin-top:2px}
.scard-controls{display:flex;align-items:center;gap:10px}
.mkt-sel{width:90px;padding:5px 7px;font-size:11px}
.scard-params{padding:0 14px 12px;border-top:1px solid var(--b1);margin-top:0}
.params-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;padding-top:10px}
.pfg{display:flex;flex-direction:column;gap:4px}
.pfg label{font-size:9px;color:var(--mu2);text-transform:uppercase;letter-spacing:.05em}
.pfg input{padding:5px 8px;font-size:11px;font-family:var(--mono)}
.save-strip{position:sticky;bottom:0;background:var(--bg);padding:12px 0;border-top:1px solid var(--b2);margin-top:12px;display:flex;gap:10px;align-items:center}
.match-ctrl{background:var(--bg2);border:1px solid var(--b2);border-radius:9px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.match-ctrl .ml{font-size:12px;color:var(--mu2);flex:1}
.match-ctrl input{width:80px}
</style>
</head><body>
<nav id="nav">
  <a class="nav-logo" href="/">⚡ Signal<b>Pro</b> <span style="font-size:10px;color:var(--mu)">v5</span></a>
  <div class="nav-links">
    <a class="nav-link" href="/dashboard">Dashboard</a>
    <a class="nav-link" href="/signals">Signals</a>
    <a class="nav-link" href="/assets">Assets</a>
    <a class="nav-link active" href="/strategies">Strategies</a>
    <a class="nav-link" href="/settings">Settings</a>
  </div>
  <div class="nav-right">
    <span id="nav-user"></span>
    <button class="hbtn red" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
<div class="page-inner">
  <div class="page-title">📊 Strategy Management</div>

  <!-- Min match -->
  <div class="match-ctrl">
    <div class="ml">
      <b style="color:#fff">Minimum Match Threshold:</b><br>
      কতটি active strategy match করলে signal generate হবে
    </div>
    <input type="number" id="min-match" min="1" max="10" value="2" style="width:80px">
    <span style="font-size:12px;color:var(--mu2)">strategies</span>
    <button class="btn primary" onclick="saveMinMatch()">Save</button>
    <span id="mm-ok" style="color:var(--up);font-size:11px;display:none">✅ Saved!</span>
  </div>

  <div class="strat-list" id="strat-list"></div>

  <div class="save-strip">
    <button class="btn primary" onclick="saveAll()">💾 সব পরিবর্তন Save করুন</button>
    <button class="btn ghost" onclick="load()">↺ Reset</button>
    <span id="save-ok" style="color:var(--up);font-size:11px;display:none">✅ সেভ হয়েছে!</span>
  </div>
</div>
</div>

<script src="/js/shared.js"></script>
<script>
let strategies=[], dragSrc=null;

async function load(){
  const [data,settings]=await Promise.all([api('/api/strategies'),api('/api/settings')]);
  strategies=data;
  document.getElementById('min-match').value=settings.strategy_min_match||2;
  render();
}

const PARAM_LABELS = {
  period:'Period', ob:'Overbought', os:'Oversold', threshold:'Threshold (%)'
};

function render(){
  const list=document.getElementById('strat-list');list.innerHTML='';
  strategies.forEach((s,i)=>{
    const card=document.createElement('div');
    card.className='scard';card.draggable=true;card.dataset.key=s.key;
    const hasParams=s.params&&Object.keys(s.params).length>0;
    card.innerHTML=
      `<div class="scard-top">`+
        `<span class="drag-handle">⠿</span>`+
        `<div class="scard-name"><div class="sname">${s.name}</div><div class="sdesc">${s.description||''}</div></div>`+
        `<div class="scard-controls">`+
          `<select class="mkt-sel" data-key="${s.key}" onchange="setMkt(this)">`+
            `<option value="OTC" ${s.market_type==='OTC'?'selected':''}>OTC Only</option>`+
            `<option value="FOREX" ${s.market_type==='FOREX'?'selected':''}>FOREX Only</option>`+
            `<option value="BOTH" ${s.market_type==='BOTH'?'selected':''}>Both</option>`+
          `</select>`+
          `<label class="tgl"><input type="checkbox" ${s.enabled?'checked':''} data-key="${s.key}" onchange="setEnabled(this)">`+
          `<div class="ttrack"></div><div class="tthumb"></div></label>`+
        `</div>`+
      `</div>`+
      (hasParams?`<div class="scard-params"><div class="params-grid">`+
        Object.entries(s.params).map(([k,v])=>
          `<div class="pfg"><label>${PARAM_LABELS[k]||k}</label>`+
          `<input type="number" step="any" value="${v}" data-key="${s.key}" data-param="${k}" onchange="setParam(this)"></div>`
        ).join('')+
      `</div></div>`:'');

    // Drag events
    card.addEventListener('dragstart',e=>{dragSrc=card;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.scard').forEach(c=>c.classList.remove('drag-over'));});
    card.addEventListener('dragover',e=>{e.preventDefault();if(dragSrc!==card)card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();card.classList.remove('drag-over');
      if(!dragSrc||dragSrc===card)return;
      const list=document.getElementById('strat-list');
      const allCards=[...list.querySelectorAll('.scard')];
      const srcIdx=allCards.indexOf(dragSrc),dstIdx=allCards.indexOf(card);
      if(srcIdx<dstIdx)card.after(dragSrc);else card.before(dragSrc);
      // Reorder strategies array
      const keys=[...list.querySelectorAll('.scard')].map(c=>c.dataset.key);
      strategies.sort((a,b)=>keys.indexOf(a.key)-keys.indexOf(b.key));
    });

    list.appendChild(card);
  });
}

function setEnabled(el){
  const s=strategies.find(x=>x.key===el.dataset.key);
  if(s)s.enabled=el.checked?1:0;
}
function setMkt(el){
  const s=strategies.find(x=>x.key===el.dataset.key);
  if(s)s.market_type=el.value;
}
function setParam(el){
  const s=strategies.find(x=>x.key===el.dataset.key);
  if(s)s.params[el.dataset.param]=parseFloat(el.value)||el.value;
}

async function saveMinMatch(){
  const v=document.getElementById('min-match').value;
  await api('/api/settings/save','POST',{strategy_min_match:v});
  const ok=document.getElementById('mm-ok');ok.style.display='inline';setTimeout(()=>ok.style.display='none',2000);
}

async function saveAll(){
  const keys=[...document.getElementById('strat-list').querySelectorAll('.scard')].map(c=>c.dataset.key);
  await Promise.all([
    api('/api/strategies/update','POST',strategies),
    api('/api/strategies/order','POST',{keys}),
  ]);
  const ok=document.getElementById('save-ok');ok.style.display='inline';setTimeout(()=>ok.style.display='none',2500);
  await load();
}

load();
</script>
</body></html>
