<!DOCTYPE html>
<html lang="bn"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Signal Pro v5 — Dashboard</title>
<link rel="stylesheet" href="/css/shared.css">
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
body{overflow:hidden}
#layout{display:grid;grid-template-columns:200px 1fr 255px;height:calc(100vh - 50px);overflow:hidden}
/* LEFT */
#left{background:var(--bg2);border-right:1px solid var(--b2);display:flex;flex-direction:column;overflow:hidden}
#asset-list{flex:1;overflow-y:auto}
.arow{padding:8px 10px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .15s;display:grid;grid-template-columns:auto 1fr auto;gap:6px;align-items:center}
.arow:hover{background:var(--bg3)}.arow.act{background:var(--accd);border-left:2px solid var(--acc)}.arow.act .anm{color:var(--acc)}
.aflag{font-size:14px;line-height:1}.anm{font-size:11px;font-weight:600;color:#fff;font-family:var(--mono)}
.apr{font-size:10px;color:var(--mu2);font-family:var(--mono);margin-top:1px}
.asc{font-size:9px;font-family:var(--mono);padding:2px 5px;border-radius:3px;background:var(--bg4);color:var(--mu);text-align:right}
.asc.h{background:var(--upd);color:var(--up)}.asc.m{background:rgba(245,158,11,.15);color:var(--gold)}
.acn{font-size:8px;margin-top:1px;text-align:right}.acn.on{color:var(--up)}.acn.off{color:var(--mu)}
.a-sig-dot{width:5px;height:5px;border-radius:50%;background:var(--mu);display:inline-block;margin-right:3px}
.a-sig-dot.on{background:var(--up);animation:pu 2s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
/* CENTER */
#center{display:flex;flex-direction:column;overflow:hidden}
#chdr{flex-shrink:0;height:42px;background:var(--bg2);border-bottom:1px solid var(--b2);display:flex;align-items:center;padding:0 11px;gap:8px}
#asym{font-size:13px;font-weight:600;font-family:var(--mono);color:#fff}
#aprice{font-size:17px;font-weight:600;font-family:var(--mono);color:#fff;transition:color .2s}
#aprice.fu{color:var(--up)}#aprice.fd{color:var(--dn)}
#achg{font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:3px}
#achg.up{background:var(--upd);color:var(--up)}#achg.dn{background:var(--dnd);color:var(--dn)}
.ohlc{display:flex;gap:9px;margin-left:5px}.oi{display:flex;flex-direction:column;gap:1px}
.ol{font-size:8px;color:var(--mu);text-transform:uppercase}.ov{font-size:10px;font-family:var(--mono)}
.ov.u{color:var(--up)}.ov.d{color:var(--dn)}
#cwrap{flex:1;position:relative;overflow:hidden}
#lwc{width:100%;height:100%}
#tip{position:absolute;top:8px;left:8px;z-index:10;background:rgba(11,14,23,.92);border:1px solid var(--b2);border-radius:5px;padding:5px 9px;font-size:10px;font-family:var(--mono);pointer-events:none;display:none;line-height:1.85}
#wait{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--mu2);pointer-events:none}
#wait .wn{font-size:24px;font-weight:600;font-family:var(--mono);color:var(--acc);margin:8px 0}
/* RIGHT */
#right{background:var(--bg2);border-left:1px solid var(--b2);display:flex;flex-direction:column;overflow:hidden}
/* Strategy bar */
#stbar{flex-shrink:0;padding:8px 11px;border-bottom:1px solid var(--b1)}
.str{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.stl{font-size:10px;font-family:var(--mono);font-weight:600;width:30px}.stl.c{color:var(--up)}.stl.p{color:var(--dn)}
.stbar2{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.stfill{height:100%;border-radius:2px;transition:width .4s}.stfill.c{background:var(--up)}.stfill.p{background:var(--dn)}
.stnum{font-size:10px;font-family:var(--mono);width:20px;text-align:right;color:var(--mu2)}
#stlist{max-height:60px;overflow-y:auto;margin-top:4px}
.stitem{font-size:9px;color:var(--mu2);padding:1px 0;display:flex;gap:5px;align-items:center}
/* Signals */
#sigpanel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#livesigs{flex:1;overflow-y:auto;padding:5px}
.nodata{padding:18px;text-align:center;color:var(--mu);font-size:11px;line-height:1.9}
/* Stats */
#statbar{flex-shrink:0;display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--b2);padding:7px 10px;gap:4px}
.stit{text-align:center}.stit .sv{font-size:12px;font-weight:600;font-family:var(--mono)}.stit .sl{font-size:8px;color:var(--mu);text-transform:uppercase;margin-top:1px}
</style>
</head><body>
<nav id="nav">
  <a class="nav-logo" href="/">⚡ Signal<b>Pro</b> <span style="font-size:10px;color:var(--mu)">v5</span></a>
  <div class="nav-links">
    <a class="nav-link" href="/dashboard">Dashboard</a>
    <a class="nav-link" href="/signals">Signals</a>
    <a class="nav-link" href="/assets">Assets</a>
    <a class="nav-link" href="/strategies">Strategies</a>
    <a class="nav-link" href="/settings">Settings</a>
  </div>
  <div class="nav-right">
    <div id="nav-clk">—</div>
    <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--mu2)">
      <div id="wsdot" style="width:6px;height:6px;border-radius:50%;background:var(--mu)"></div>
      <span id="wslbl">Connecting</span>
    </div>
    <button class="kill-pill sys-on" id="sys-kill" onclick="toggleSystem()"><span class="dot"></span>⚡ System ON</button>
    <button class="kill-pill ai-on"  id="ai-kill"  onclick="toggleAI()"><span class="dot"></span>🧠 AI ON</button>
    <span id="nav-user" style="font-size:11px;color:var(--mu2)"></span>
    <button class="hbtn red" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page" style="overflow:hidden">
<div id="layout">
  <div id="left">
    <div class="card-hdr"><span>Assets</span><span class="badge acc" id="lvcnt">0 Live</span></div>
    <div id="asset-list"></div>
  </div>
  <div id="center">
    <div id="chdr">
      <div id="asym">—</div><div id="aprice">—</div><div id="achg" class="up">—</div>
      <div class="ohlc">
        <div class="oi"><span class="ol">O</span><span class="ov" id="co">—</span></div>
        <div class="oi"><span class="ol">H</span><span class="ov u" id="ch">—</span></div>
        <div class="oi"><span class="ol">L</span><span class="ov d" id="cl">—</span></div>
        <div class="oi"><span class="ol">C</span><span class="ov" id="cc">—</span></div>
      </div>
      <span id="ccount" style="margin-left:auto;font-size:9px;color:var(--mu);font-family:var(--mono)"></span>
    </div>
    <div id="cwrap">
      <div id="lwc"></div>
      <div id="tip"></div>
      <div id="wait"><div>⏳ Candle জমছে...</div><div class="wn" id="wcnt">0</div><div style="font-size:10px;color:var(--mu)">১৫+ candle দরকার</div></div>
    </div>
  </div>
  <div id="right">
    <div class="card-hdr"><span>Strategy</span><span class="badge" id="lean-b">—</span></div>
    <div id="stbar">
      <div class="str"><span class="stl c">CALL</span><div class="stbar2"><div class="stfill c" id="sfc" style="width:0%"></div></div><span class="stnum" id="snc">0</span></div>
      <div class="str"><span class="stl p">PUT</span><div class="stbar2"><div class="stfill p" id="sfp" style="width:0%"></div></div><span class="stnum" id="snp">0</span></div>
      <div id="stlist"></div>
    </div>
    <div id="sigpanel">
      <div class="card-hdr" style="border-top:1px solid var(--b2)"><span>Live Signals</span><span class="badge acc" id="sigcnt">0</span></div>
      <div id="livesigs"><div class="nodata">⏳ সিগন্যালের অপেক্ষায়...</div></div>
    </div>
    <div id="statbar">
      <div class="stit"><div class="sv" id="st-t">0</div><div class="sl">Total</div></div>
      <div class="stit"><div class="sv" style="color:var(--up)" id="st-w">0</div><div class="sl">Wins</div></div>
      <div class="stit"><div class="sv" style="color:var(--dn)" id="st-l">0</div><div class="sl">Loss</div></div>
      <div class="stit"><div class="sv" style="color:var(--gold)" id="st-r">—%</div><div class="sl">Win Rate</div></div>
    </div>
  </div>
</div>
</div>
<div id="toast-wrap"></div>
<script src="/js/shared.js"></script>
<script>
let chart,cSer,vSer,activeSym=null,allAssets=[],allSigs=[],cm={},openPx={},ticks=0,ws,wsT;
const TF=60;

function initChart(){
  const w=document.getElementById('cwrap');
  chart=LightweightCharts.createChart(document.getElementById('lwc'),{
    width:w.clientWidth,height:w.clientHeight,
    layout:{background:{type:'solid',color:'#0b0e17'},textColor:'#565d75',fontSize:11,fontFamily:"'Courier New',monospace"},
    grid:{vertLines:{color:'rgba(255,255,255,0.04)'},horzLines:{color:'rgba(255,255,255,0.04)'}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal,vertLine:{color:'rgba(255,255,255,0.15)',labelBackgroundColor:'#1c2030'},horzLine:{color:'rgba(255,255,255,0.15)',labelBackgroundColor:'#1c2030'}},
    rightPriceScale:{borderVisible:false,scaleMargins:{top:0.06,bottom:0.06}},
    timeScale:{borderVisible:false,timeVisible:true,secondsVisible:false},
  });
  cSer=chart.addCandlestickSeries({upColor:'#26a69a',downColor:'#ef5350',borderUpColor:'#26a69a',borderDownColor:'#ef5350',wickUpColor:'#26a69a',wickDownColor:'#ef5350'});

  chart.subscribeCrosshairMove(p=>{
    const tip=document.getElementById('tip');
    if(!p||!p.time){tip.style.display='none';return;}
    const c=cm[activeSym]?.[p.time];if(!c){tip.style.display='none';return;}
    const chg=((c.close-c.open)/c.open*100),col=c.close>=c.open?'#26a69a':'#ef5350';
    const d=new Date(p.time*1000);
    tip.style.display='block';
    tip.innerHTML=`<span style="color:#565d75">${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}</span><br>O <b>${c.open.toFixed(5)}</b> H <b style="color:#26a69a">${c.high.toFixed(5)}</b> L <b style="color:#ef5350">${c.low.toFixed(5)}</b> C <b style="color:${col}">${c.close.toFixed(5)}</b>`;
  });
  new ResizeObserver(()=>{if(chart)chart.applyOptions({width:w.clientWidth,height:w.clientHeight});}).observe(w);
}

function onTick(sym,price,timestamp,volume){
  ticks++;
  const ts=Math.floor(timestamp/TF)*TF;
  if(!cm[sym])cm[sym]={};
  if(!openPx[sym])openPx[sym]=price;
  const c=cm[sym];
  if(!c[ts])c[ts]={time:ts,open:price,high:price,low:price,close:price,volume:0,_sv:volume};
  else{if(price>c[ts].high)c[ts].high=price;if(price<c[ts].low)c[ts].low=price;c[ts].close=price;c[ts].volume=Math.max(0,volume-c[ts]._sv);}
  const a=allAssets.find(x=>x.symbol===sym);if(a){a.lastPrice=price;a.chg=((price-openPx[sym])/openPx[sym]*100);}
  updateARow(sym);
  if(sym===activeSym){redraw();updateChdr(sym,price);}
}

function loadCandlesDB(sym,rows){
  if(!cm[sym])cm[sym]={};
  rows.forEach(r=>{cm[sym][r.time]={time:r.time,open:r.open,high:r.high,low:r.low,close:r.close,volume:r.volume||0,_sv:0};});
  if(rows.length&&!openPx[sym])openPx[sym]=rows[0].open;
}

function redraw(){
  if(!activeSym||!chart)return;
  const sorted=Object.values(cm[activeSym]||{}).sort((a,b)=>a.time-b.time);
  const n=sorted.length;
  document.getElementById('ccount').textContent=n+' candles';
  document.getElementById('wcnt').textContent=n;
  document.getElementById('wait').style.display=n<5?'flex':'none';
  if(!n)return;
  cSer.setData(sorted.map(c=>({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close})));
  const last=sorted[n-1];
  document.getElementById('co').textContent=last.open.toFixed(5);
  document.getElementById('ch').textContent=last.high.toFixed(5);
  document.getElementById('cl').textContent=last.low.toFixed(5);
  document.getElementById('cc').textContent=last.close.toFixed(5);
}

function updateChdr(sym,price){
  const a=allAssets.find(x=>x.symbol===sym);
  document.getElementById('asym').textContent=a?`${a.flag} ${a.name}`:sym;
  const pe=document.getElementById('aprice');
  pe.className=price>(pe._last||price)?'fu':price<(pe._last||price)?'fd':'';
  pe._last=price;pe.textContent=price.toFixed(5);
  setTimeout(()=>pe.className='',300);
  const chg=openPx[sym]?((price-openPx[sym])/openPx[sym]*100):0;
  const ce=document.getElementById('achg');
  ce.textContent=(chg>=0?'+':'')+chg.toFixed(3)+'%';ce.className=chg>=0?'up':'dn';
}

function drawAssets(){
  const live=allAssets.filter(a=>a.live);
  const lv=live.filter(a=>a.connected).length;
  document.getElementById('lvcnt').textContent=lv+' Live';
  const box=document.getElementById('asset-list');box.innerHTML='';
  live.forEach(a=>{
    const sc=a.strategy?a.strategy.strength:0,sc2=sc>=70?'h':sc>=45?'m':'';
    const row=document.createElement('div');
    row.className='arow'+(a.symbol===activeSym?' act':'');row.id='ar-'+a.symbol;
    row.innerHTML=
      `<span class="aflag">${a.flag||'🔵'}</span>`+
      `<div><div class="anm">${a.name}</div><div class="apr">${a.lastPrice?a.lastPrice.toFixed(5):'—'}</div></div>`+
      `<div><div class="asc ${sc2}">${a.strategy?.lean||'—'}</div>`+
      `<div class="acn ${a.connected?'on':'off'}">${a.signal_on?'<span class="a-sig-dot on"></span>':''}${a.connected?'Live':'Off'}</div></div>`;
    row.onclick=()=>selectAsset(a.symbol);
    box.appendChild(row);
  });
}

function updateARow(sym){
  const el=document.getElementById('ar-'+sym),a=allAssets.find(x=>x.symbol===sym);
  if(!el||!a)return;
  el.querySelector('.apr').textContent=a.lastPrice?a.lastPrice.toFixed(5):'—';
  if(a.strategy){const sc=a.strategy.strength,sc2=sc>=70?'h':sc>=45?'m':'';el.querySelector('.asc').textContent=a.strategy.lean||'—';el.querySelector('.asc').className='asc '+sc2;}
}

async function selectAsset(sym){
  activeSym=sym;
  document.querySelectorAll('.arow').forEach(r=>r.classList.remove('act'));
  const el=document.getElementById('ar-'+sym);if(el)el.classList.add('act');
  if(!cm[sym]||Object.keys(cm[sym]).length<3){
    try{const r=await api('/api/candles?symbol='+sym);loadCandlesDB(sym,r);}catch(e){}
  }
  redraw();
  const a=allAssets.find(x=>x.symbol===sym);
  if(a&&a.lastPrice)updateChdr(sym,a.lastPrice);
  if(a&&a.strategy)updateStrategy(a.strategy);
}

function updateStrategy(s){
  if(!s)return;
  const cw=s.callW||0,pw=s.putW||0,tot=cw+pw||1;
  document.getElementById('sfc').style.width=(cw/tot*100)+'%';
  document.getElementById('sfp').style.width=(pw/tot*100)+'%';
  document.getElementById('snc').textContent=cw.toFixed(1);
  document.getElementById('snp').textContent=pw.toFixed(1);
  const lb=document.getElementById('lean-b');
  lb.textContent=(s.lean||'—')+' '+(s.strength||0)+'%';
  lb.className='badge '+(s.lean==='CALL'?'up':s.lean==='PUT'?'dn':'');
  const sl=document.getElementById('stlist');sl.innerHTML='';
  (s.strategies||[]).slice(0,5).forEach(st=>{
    const d=document.createElement('div');d.className='stitem';
    d.innerHTML=`<span style="color:${st.signal==='CALL'?'#26a69a':'#ef5350'};font-weight:700;font-size:9px">${st.signal}</span><span>${st.name}</span>`;
    sl.appendChild(d);
  });
}

function mkSigCard(s){
  const cls=s.direction,arr=cls==='CALL'?'▲':'▼';
  const et=new Date((s.entry_time||s.entryTime)*1000).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const xt=new Date((s.expiry_time||s.expiryTime)*1000).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const result=s.result||'active';
  const strats=Array.isArray(s.matched_strategies)?s.matched_strategies.slice(0,3).map(x=>x.name||x).join(', '):'';
  const d=document.createElement('div');
  d.className=`sig-card ${cls}`;d.id='sc-'+(s.uid||s.id);
  d.innerHTML=
    `<div class="sig-head ${cls}"><span style="font-size:13px">${s.flag||''}</span><span class="sig-dir ${cls}">${arr} ${cls}</span><span style="margin-left:auto;font-size:10px">${s.name}</span><span class="rb ${result}" style="margin-left:6px">${result}</span></div>`+
    `<div class="sig-body"><div class="sig-grid">`+
    `<div class="sf"><span class="sfl">Entry</span><span class="sfv ${cls.toLowerCase()}">${et}</span></div>`+
    `<div class="sf"><span class="sfl">Expiry</span><span class="sfv">${xt}</span></div>`+
    `<div class="sf"><span class="sfl">AI Conf</span><span class="sfv">${s.confidence||0}%</span></div>`+
    `</div><div style="font-size:9px;color:var(--mu2)">${strats}</div>`+
    `${s.custom_msg||s.customMsg?`<div style="font-size:9px;color:var(--gold);margin-top:2px">💬 ${s.custom_msg||s.customMsg}</div>`:''}`+
    `</div>`;
  return d;
}

function drawSigs(){
  const active=allSigs.filter(s=>(s.status==='active'||!s.result)).slice(0,8);
  document.getElementById('sigcnt').textContent=active.length;
  const box=document.getElementById('livesigs');
  if(!active.length){box.innerHTML='<div class="nodata">⏳ সিগন্যালের অপেক্ষায়...</div>';return;}
  box.innerHTML='';active.forEach(s=>box.appendChild(mkSigCard(s)));
}

function updateStats(s){
  document.getElementById('st-t').textContent=s.total||0;
  document.getElementById('st-w').textContent=s.wins||0;
  document.getElementById('st-l').textContent=s.losses||0;
  document.getElementById('st-r').textContent=(s.winRate||'0.0')+'%';
}

// WS
function connectWS(){
  ws=new WebSocket(`ws://localhost:3000?token=${TOKEN}`);
  ws.onopen=()=>{document.getElementById('wsdot').style.background='#26a69a';document.getElementById('wslbl').textContent='Live';};
  ws.onmessage=e=>{try{handle(JSON.parse(e.data));}catch(err){}};
  ws.onclose=()=>{document.getElementById('wsdot').style.background='#ef5350';document.getElementById('wslbl').textContent='Reconnecting';clearTimeout(wsT);wsT=setTimeout(connectWS,3000);};
}

function handle(m){
  switch(m.type){
    case 'init':
      allAssets=m.state.assets||[];allSigs=m.state.signals||[];
      updateKillBtns(m.state.running,m.state.aiEnabled);
      allAssets.filter(a=>a.live).forEach(a=>{
        api('/api/candles?symbol='+a.symbol).then(r=>{loadCandlesDB(a.symbol,r);if(a.symbol===activeSym)redraw();}).catch(()=>{});
      });
      drawAssets();drawSigs();updateStats(m.state.stats||{});
      const first=allAssets.find(a=>a.live);if(first&&!activeSym)selectAsset(first.symbol);
      break;
    case 'tick': onTick(m.symbol,m.price,m.timestamp,m.volume); break;
    case 'status':{const a=allAssets.find(x=>x.symbol===m.symbol);if(a){a.connected=m.connected;drawAssets();}} break;
    case 'strategy':{const a=allAssets.find(x=>x.symbol===m.symbol);if(a){a.strategy={lean:m.lean,strength:m.strength,callW:m.callW,putW:m.putW,strategies:m.strategies};if(m.symbol===activeSym)updateStrategy(a.strategy);updateARow(m.symbol);}} break;
    case 'signal': allSigs.unshift(m.signal);drawSigs();const el=document.getElementById('ar-'+m.signal.symbol);if(el){el.style.background=m.signal.direction==='CALL'?'rgba(38,166,154,.25)':'rgba(239,83,80,.25)';setTimeout(()=>el.style.background='',2500);} break;
    case 'result':{const s=allSigs.find(x=>(x.uid||x.id+'')===m.uid);if(s){s.result=m.result;s.status='closed';}updateStats(m.stats||{});drawSigs();showToast(`${m.result==='WIN'?'🏆':'💔'} <b>${m.result}</b> · ${m.flag||''} ${m.name} · ${m.direction}<br>Close: ${m.closePrice} · ${m.pnl}`,m.result);} break;
    case 'system': updateKillBtns(m.running,null); break;
    case 'ai_toggle': updateKillBtns(null,m.enabled); break;
    case 'assets': allAssets=m.assets;drawAssets(); break;
  }
}

window.addEventListener('load',()=>{initChart();connectWS();});
</script>
</body></html>
